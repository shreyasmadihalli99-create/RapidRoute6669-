<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RapidRoute Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Montserrat', sans-serif;
    background: linear-gradient(135deg, #FFE4C4, #FFC38C);
    color:#6B4226;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

header{
    display:flex;
    align-items:center;
    padding:15px 20px;
}

header img.logo{
    width:50px;
    height:50px;
    object-fit:cover;
    margin-right:15px;
}

header .titles{
    display:flex;
    flex-direction:column;
}

header h1{
    font-size:28px;
    margin:0;
    font-weight:600;
    color:#6B4226;
}

header h2{
    font-size:16px;
    margin:2px 0 0 0;
    font-weight:400;
    font-style:italic;
    color:#8B5E3C;
}

.main{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap:20px;
    padding:20px;
    flex-grow:1;
}

.hotel-card{
    background: rgba(255,255,255,0.3);
    border-radius:15px;
    overflow:hidden;
    box-shadow:
        0 0 10px rgba(255,255,255,0.2),
        0 0 20px rgba(255,218,185,0.4);
    transition: transform 0.3s, box-shadow 0.3s;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    height:100%;
    text-decoration:none;
    color:inherit;
}

.hotel-card img{
    width:100%;
    height:70%;
    object-fit:cover;
    display:block;
    background: rgba(255,255,255,0.1);
}

.hotel-card h3{
    margin:10px;
    font-size:18px;
    font-weight:500;
    color:#6B4226;
}

.hotel-card:hover{
    transform: translateY(-5px);
    box-shadow:
        0 0 15px rgba(255,255,255,0.4),
        0 0 30px rgba(255,218,185,0.6);
}

@media(max-width:480px){
    .main{
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(3, 1fr);
        gap:15px;
        padding:10px;
    }
    .hotel-card img{
        height:60%;
    }
    header h1{
        font-size:22px;
    }
    header h2{
        font-size:14px;
    }
}
</style>
</head>
<body>

<header>
    <img src="rapidroutelogo.png" class="logo" alt="Logo">
    <div class="titles">
        <h1>RapidRoute</h1>
        <h2>Choose Your Hotel</h2>
    </div>
</header>

<main class="main">
    <!-- Raghuveer Café opens your second code menu page -->
    <a href="raguveer.html" class="hotel-card">
        <img src="raghuveer.png" alt="Raghuveer Café">
        <h3>Raghuveer Café</h3>
    </a>
    <!-- Other hotels can be linked similarly -->
    <a href="Raghavendra.html" class="hotel-card">
        <img src="ragu.png" alt="Raghavendra Vaibhav">
        <h3>Raghavendra Vaibhav</h3>
    </a>
    <a href="HotelPushkar.html" class="hotel-card">
        <img src="push.png" alt="Hotel Pushkar">
        <h3>Hotel Pushkar</h3>
    </a>
    <a href="HukkeriDhaba1.html" class="hotel-card">
        <img src="hukkeri.png" alt="Hukkeri Dhaba">
        <h3>Hukkeri Dhaba</h3>
    </a>
    <a href="Daneshwari Hotel1.html" class="hotel-card">
        <img src="DANESH.PNG" alt="Hotel Daneshwari">
        <h3>Hotel Daneshwari</h3>
    </a>
    <a href="CakeMart.html" class="hotel-card">
        <img src="cake.png" alt="Cake Mart">
        <h3>Cake Mart</h3>
    </a>
</main>

</body>
</html>
